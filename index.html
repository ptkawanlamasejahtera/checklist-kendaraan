<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Checklist Kendaraan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --p900: #2e1065;
    --p800: #3b0764;
    --p700: #4c0f8f;
    --p600: #6d28d9;
    --p500: #7c3aed;
    --p400: #8b5cf6;
    --p300: #a78bfa;
    --p200: #c4b5fd;
    --p100: #ede9fe;
    --p50:  #f5f3ff;
    --red: #ef4444;
    --green: #16a34a;
    --gray-50: #fafafa;
    --gray-100: #f4f4f5;
    --gray-200: #e4e4e7;
    --gray-400: #a1a1aa;
    --gray-600: #52525b;
    --gray-800: #27272a;
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--p50);
    color: var(--gray-800);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--p800) 0%, var(--p600) 100%);
    color: #fff;
    padding: 20px 20px 52px;
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -30px; left: -20px; right: -20px;
    height: 60px;
    background: var(--p50);
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }
  header .hicon {
    width: 40px; height: 40px;
    background: rgba(255,255,255,.15);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -.02em; }
  header p  { font-size: 12px; opacity: .7; margin-top: 3px; }

  /* ── BODY ── */
  .form-body { padding: 8px 16px 24px; max-width: 480px; margin: 0 auto; }

  /* ── SECTION TITLE ── */
  .section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--p500);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin: 22px 0 10px;
  }
  .section-title::before {
    content: '';
    width: 3px; height: 14px;
    background: var(--p400);
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── CARD ── */
  .card {
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid var(--p200);
    overflow: hidden;
    margin-bottom: 12px;
    box-shadow: 0 2px 12px rgba(109,40,217,.07);
  }

  /* ── FIELD ── */
  .field {
    padding: 13px 16px;
    border-bottom: 1px solid var(--gray-100);
  }
  .field:last-child { border-bottom: none; }

  .field label {
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-600);
    letter-spacing: .04em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
  }
  .field label .req { color: var(--red); margin-left: 2px; }

  /* ── INPUTS ── */
  input[type=date], input[type=time], input[type=number], input[type=text] {
    width: 100%;
    height: 44px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    padding: 0 14px;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    color: var(--gray-800);
    background: var(--gray-50);
    appearance: none;
    -webkit-appearance: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus {
    outline: none;
    border-color: var(--p400);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(139,92,246,.15);
  }

  /* ── KM STEPPER ── */
  .num-row {
    display: flex;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--gray-50);
    height: 44px;
    transition: border-color .15s;
  }
  .num-row:focus-within {
    border-color: var(--p400);
    box-shadow: 0 0 0 3px rgba(139,92,246,.15);
  }
  .num-row input {
    border: none; border-radius: 0;
    text-align: center; flex: 1;
    background: transparent;
    font-size: 17px; font-weight: 700;
    color: var(--p700);
    box-shadow: none;
  }
  .num-btn {
    width: 48px; height: 44px;
    background: var(--p100);
    border: none;
    font-size: 22px;
    color: var(--p600);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: background .12s;
  }
  .num-btn:active { background: var(--p200); }

  /* ── TOGGLE BUTTONS ── */
  .toggle-row { display: flex; gap: 8px; }
  .tog {
    flex: 1;
    height: 44px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    background: #fff;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    color: var(--gray-400);
    cursor: pointer;
    letter-spacing: .06em;
    -webkit-tap-highlight-color: transparent;
    transition: all .15s;
  }
  .tog.active {
    background: var(--p100);
    border-color: var(--p400);
    color: var(--p700);
    box-shadow: 0 0 0 3px rgba(139,92,246,.12);
  }

  /* ── PHOTO BOX ── */
  .photo-box {
    border: 2px dashed var(--p200);
    border-radius: var(--radius-sm);
    background: var(--p50);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color .15s, background .15s;
    min-height: 120px;
  }
  .photo-box:active { border-color: var(--p400); background: var(--p100); }
  .photo-box svg { color: var(--p300); }
  .photo-box .photo-hint {
    font-size: 12px;
    font-weight: 500;
    color: var(--p400);
  }
  .photo-box .photo-sub {
    font-size: 11px;
    color: var(--gray-400);
    margin-top: -4px;
  }
  .photo-box input[type=file] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }
  .photo-box img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 8px;
    display: none;
    position: absolute; inset: 0;
  }
  .photo-box.has-photo img { display: block; }
  .photo-box.has-photo svg,
  .photo-box.has-photo .photo-hint,
  .photo-box.has-photo .photo-sub { opacity: 0; }

  /* ── SUBMIT ── */
  .submit-btn {
    width: 100%;
    height: 52px;
    background: linear-gradient(135deg, var(--p600) 0%, var(--p500) 100%);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    letter-spacing: .02em;
    cursor: pointer;
    margin-top: 8px;
    -webkit-tap-highlight-color: transparent;
    transition: opacity .15s, transform .1s;
    box-shadow: 0 4px 20px rgba(109,40,217,.35);
  }
  .submit-btn:active { opacity: .88; transform: scale(.98); }
  .submit-btn:disabled { background: var(--gray-400); box-shadow: none; cursor: not-allowed; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--gray-800);
    color: #fff;
    padding: 12px 22px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    z-index: 100;
    white-space: nowrap;
    box-shadow: 0 6px 24px rgba(0,0,0,.25);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--green); }
  .toast.error   { background: var(--red); }

  /* ── SPINNER ── */
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .bottom-space { height: 40px; }
</style>
</head>
<body>

<header>
  <div class="hicon">
    <svg width="22" height="22" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
      <path d="M9 17H5a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/>
      <path d="M9 11l3 3L22 4"/><path d="M16 19h6"/><path d="M19 16v6"/>
    </svg>
  </div>
  <h1>Checklist Kendaraan</h1>
  <p id="header-date"></p>
</header>

<div class="form-body">

  <!-- Data Kendaraan -->
  <div class="section-title">Data Kendaraan</div>
  <div class="card">
    <div class="field">
      <label>Tanggal <span class="req">*</span></label>
      <input type="date" id="tgl">
    </div>
    <div class="field">
      <label>Kode Armada <span class="req">*</span></label>
      <input type="text" id="kode_armada" placeholder="Contoh: F01" maxlength="6"
        oninput="onKodeArmada(this.value)"
        style="text-transform:uppercase;font-weight:700;letter-spacing:.05em">
    </div>
    <div class="field">
      <label>No Polisi</label>
      <input type="text" id="nopol" placeholder="Terisi otomatis" readonly
        style="background:#f5f3ff;color:var(--p600);font-weight:700;cursor:default">
    </div>
    <div class="field">
      <label>KM Check Point <span class="req">*</span></label>
      <div class="num-row">
        <button class="num-btn" onclick="adj('km',-100)" aria-label="kurang">−</button>
        <input type="number" id="km" value="0" min="0">
        <button class="num-btn" onclick="adj('km',100)" aria-label="tambah">+</button>
      </div>
    </div>
  </div>

  <!-- Odometer -->
  <div class="section-title">Odometer</div>
  <div class="card">
    <div class="field">
      <label>Foto KM <span class="req">*</span></label>
      <div class="photo-box" id="box-km">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
          <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span class="photo-hint">Tap untuk foto</span>
        <span class="photo-sub">Angka odometer kendaraan</span>
        <input type="file" accept="image/*" capture="environment" onchange="previewPhoto(this,'box-km','prev-km')">
        <img id="prev-km" alt="Foto KM">
      </div>
    </div>
  </div>

  <!-- BBM & Kondisi -->
  <div class="section-title">BBM &amp; Kondisi</div>
  <div class="card">
    <div class="field">
      <label>Status BBM <span class="req">*</span></label>
      <div class="toggle-row">
        <button class="tog" onclick="pick(this,'bbm')">FULL</button>
        <button class="tog" onclick="pick(this,'bbm')">TIDAK FULL</button>
      </div>
    </div>
    <div class="field">
      <label>Foto BBM <span class="req">*</span></label>
      <div class="photo-box" id="box-bbm">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
          <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span class="photo-hint">Tap untuk foto</span>
        <span class="photo-sub">Kondisi indikator BBM</span>
        <input type="file" accept="image/*" capture="environment" onchange="previewPhoto(this,'box-bbm','prev-bbm')">
        <img id="prev-bbm" alt="Foto BBM">
      </div>
    </div>
  </div>

  <!-- Foto BOX -->
  <div class="section-title">Foto BOX</div>
  <div class="card">
    <div class="field">
      <label>Foto Dalam Box <span class="req">*</span></label>
      <div class="photo-box" id="box-dalam">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
          <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span class="photo-hint">Tap untuk foto</span>
        <span class="photo-sub">Kondisi dalam box</span>
        <input type="file" accept="image/*" capture="environment" onchange="previewPhoto(this,'box-dalam','prev-dalam')">
        <img id="prev-dalam" alt="Foto Dalam">
      </div>
    </div>
    <div class="field">
      <label>Foto Armada Tampak Belakang <span class="req">*</span></label>
      <div class="photo-box" id="box-belakang">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
          <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span class="photo-hint">Tap untuk foto</span>
        <span class="photo-sub">Tampak belakang armada</span>
        <input type="file" accept="image/*" capture="environment" onchange="previewPhoto(this,'box-belakang','prev-belakang')">
        <img id="prev-belakang" alt="Foto Belakang">
      </div>
    </div>
  </div>

  <!-- Suggest & Jadwal -->
  <div class="section-title">Suggest</div>
  <div class="card">
    <div class="field">
      <label>Suggest Cuci <span class="req">*</span></label>
      <div class="toggle-row">
        <button class="tog" onclick="pick(this,'sug')">CUCI</button>
        <button class="tog" onclick="pick(this,'sug')">TIDAK CUCI</button>
      </div>
    </div>
    <div class="field">
      <label>Start</label>
      <input type="time" id="start">
    </div>
    <div class="field">
      <label>Finish</label>
      <input type="time" id="finish">
    </div>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitForm()">
    ✓ &nbsp;Simpan Checklist
  </button>

  <div class="bottom-space"></div>
</div>

<div class="toast" id="toast"></div>

<script>

  const armada = {
    'F01':  'A8012ZV',
    'F02':  'A8607WX',
    'F03':  'A8386VX',
    'F04':  'A8976XA',
    'F10':  'B9015SCF',
    'F11':  'B9018SCF',
    'F05':  'A8157ZC',
    'F06':  'A8232ZC',
    'F3VB': 'B9747SCE',
    'F08':  'A8710ZE',
    'F09':  'A8711ZE',
    'F07':  'A8709ZE',
    'F5VB': 'A8541ZE',
    'F13':  'A8506ZD',
    'F7VB': 'A8088VC',
  };

  function onKodeArmada(val) {
    const kode = val.toUpperCase();
    document.getElementById('kode_armada').value = kode;
    const nopol = armada[kode];
    if (nopol) {
      document.getElementById('nopol').value = nopol;
      document.getElementById('nopol').style.color = 'var(--p600)';
      document.getElementById('nopol').style.fontWeight = '700';
    } else {
      document.getElementById('nopol').value = '';
      document.getElementById('nopol').style.color = '';
      document.getElementById('nopol').style.fontWeight = '';
    }
  }
  const state = { bbm: null, sug: null };

  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('tgl').value = `${yyyy}-${mm}-${dd}`;
  document.getElementById('header-date').textContent =
    today.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

  function adj(id, delta) {
    const el = document.getElementById(id);
    el.value = Math.max(0, (parseInt(el.value) || 0) + delta);
  }

  function pick(btn, grp) {
    btn.closest('.toggle-row').querySelectorAll('.tog').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state[grp] = btn.textContent.trim();
  }

  const photos = {};

  function previewPhoto(input, boxId, imgId) {
    const f = input.files[0]; if (!f) return;
    const box = document.getElementById(boxId);
    const img = document.getElementById(imgId);
    const reader = new FileReader();
    reader.onload = e => {
      img.src = e.target.result;
      box.classList.add('has-photo');
      photos[imgId] = e.target.result; // store full data URL (base64)
    };
    reader.readAsDataURL(f);
  }

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (type ? ' '+type : '');
    void t.offsetWidth;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  async function submitForm() {
    const tgl   = document.getElementById('tgl').value;
    const nopol = document.getElementById('nopol').value;
    const km    = document.getElementById('km').value;

    const kode_armada = document.getElementById('kode_armada').value;
    if (!tgl || !kode_armada || !km) { showToast('Tanggal, Kode Armada, dan KM wajib diisi!', 'error'); return; }
    if (!state.bbm) { showToast('Pilih status BBM!', 'error'); return; }
    if (!state.sug) { showToast('Pilih Suggest Cuci!', 'error'); return; }
    if (!photos['prev-km'] || !photos['prev-bbm'] || !photos['prev-dalam'] || !photos['prev-belakang']) {
      showToast('Semua foto wajib diisi!', 'error'); return;
    }

    const scriptUrl = 'https://script.google.com/macros/s/AKfycbwGiGUpPpJQOK1BRieIGrRcZz0ZqoYFbn10i2RDAb-nJ2mhO8L0SZ8SVtjsbo8ylp2A/exec';

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Mengirim foto…';

    const payload = {
      tanggal: tgl, kode_armada: document.getElementById('kode_armada').value, nopol, km,
      bbm: state.bbm, suggest: state.sug,
      start: document.getElementById('start').value,
      finish: document.getElementById('finish').value,
      foto_km: photos['prev-km'],
      foto_bbm: photos['prev-bbm'],
      foto_dalam: photos['prev-dalam'],
      foto_belakang: photos['prev-belakang']
    };

    try {
      await fetch(scriptUrl, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      showToast('✓ Checklist berhasil disimpan!', 'success');
      setTimeout(() => location.reload(), 2000);
    } catch(err) {
      showToast('Gagal menyimpan. Cek koneksi!', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '✓ &nbsp;Simpan Checklist';
    }
  }
</script>
</body>
</html>
